<!doctype html>
<html lang="en" data-tone="white" data-type="signage" data-ink="full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="manifest" href="{{ '/manifest.webmanifest' | relative_url }}">
  <meta name="theme-color" content="#23201a">
  <title>{{ page.title }} · {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/field.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/field-sub.css' | relative_url }}">
  <script src="{{ '/assets/field-theme.js' | relative_url }}"></script>
  <style>
    /* markdown-rendered docs: prose rhythm in the Field idiom */
    .md-doc { max-width: 820px; }
    .md-doc h1 { font-size: clamp(28px, 4.5vw, 44px); margin: 0 0 18px; }
    .md-doc h2 { font-size: clamp(20px, 3vw, 26px); border-top: 1px solid var(--ink); padding-top: 14px; margin: 36px 0 12px; }
    .md-doc h3 { font-size: 17px; margin: 26px 0 10px; }
    .md-doc p, .md-doc li { color: var(--ink-soft); font-size: 15px; line-height: 1.6; }
    .md-doc ul, .md-doc ol { padding-left: 22px; }
    .md-doc li { margin: 5px 0; }
    .md-doc ul li::marker { content: "▪  "; color: var(--muted); }
    .md-doc a { color: var(--ink); text-underline-offset: 3px; }
    .md-doc blockquote { margin: 18px 0; padding: 12px 18px; border: 1px solid var(--rule); border-left: 3px solid var(--ink); background: var(--surface); }
    .md-doc blockquote p { color: var(--ink); margin: 0; }
    .md-doc code { font-family: var(--font-mono); font-size: 0.9em; border: 1px solid var(--rule-soft); padding: 1px 5px; background: var(--surface-2); }
    .md-doc pre { overflow-x: auto; border: 1px solid var(--rule); padding: 14px; background: var(--surface-2); }
    .md-doc pre code { border: 0; padding: 0; background: transparent; }
    .md-doc table { width: 100%; border-collapse: collapse; margin: 16px 0 24px; font-size: 14px; }
    .md-doc th { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--ink); text-align: left; padding: 8px 10px 8px 2px; }
    .md-doc td { border-bottom: 1px solid var(--rule); padding: 9px 10px 9px 2px; vertical-align: top; color: var(--ink-soft); }
    .md-doc hr { border: 0; border-top: 1px solid var(--rule); margin: 32px 0; }
    .md-doc img { max-width: 100%; }
    @media (max-width: 760px) {
      .md-doc table { display: block; overflow-x: auto; max-width: 100%; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="wrap nav-inner">
      <a class="brand" href="{{ '/index.html' | relative_url }}"><span class="mark"></span>Learning Machines</a>
      <div class="nav-links">
        <a href="{{ '/index.html#tools' | relative_url }}" class="hide-sm">Tool index</a>
        <a href="{{ '/index.html#sessions' | relative_url }}" class="hide-sm">Sessions</a>
        <a class="btn btn-sm" href="{{ '/index.html#materials' | relative_url }}">All materials</a>
      </div>
    </div>
  </nav>

  <header class="sub-hero" data-mod="cross">
    <div class="wrap">
      <div class="crumb">
        <a href="{{ '/index.html' | relative_url }}">Home</a><span class="sep">/</span>
        <a href="{{ '/index.html#materials' | relative_url }}">Materials</a><span class="sep">/</span>
        <span>{{ page.title }}</span>
      </div>
    </div>
  </header>

  <main class="section-tight">
    <div class="wrap">
      <article class="md-doc">
        {{ content }}
      </article>
    </div>
  </main>

  <footer class="footer">
    <div class="wrap">
      <div class="brand" style="margin-bottom: 12px;"><span class="mark"></span>Learning Machines</div>
      <nav class="footer-links" aria-label="Site"><a href="{{ '/index.html' | relative_url }}">Home</a> · <a href="{{ '/pages/tools.html' | relative_url }}">Tool index</a> · <a href="{{ '/pages/materials.html' | relative_url }}">Materials</a></nav>
      <p class="colophon">Static workshop materials · Learning Machines: Text, Images, Video.</p>
    </div>
  </footer>
  <script src="{{ '/assets/analytics.js' | relative_url }}"></script>
</body>
</html>
